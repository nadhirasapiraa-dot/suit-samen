<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Permainan Suit</title>

    <link rel="stylesheet" href="style.css" />

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>Permainan Suit</h1>

      <div class="camera-box">
        <video id="video" autoplay playsinline muted></video>

        <canvas id="canvas"></canvas>
        <div class="overlay">
          <img id="aiHandImg" src="" />
          <div id="gameMessage"></div>
        </div>
      </div>

<div class="info">


  <button id="playBtn">SUIT!</button>

  <h2 id="result">Menunggu...</h2>

  <div class="scoreboard">

    <div class="score-card">
      <span>KAMU</span>
      <h2 id="playerScore">0</h2>
    </div>

    <div class="vs">VS</div>

    <div class="score-card">
      <span>AI</span>
      <h2 id="aiScore">0</h2>
    </div>

  </div>
 <div class="game-stats">

    <div class="stat-box">
      <span>GESTURE</span>
      <h3 id="gesture">-</h3>
    </div>

    <div class="stat-box">
      <span>RONDE</span>
      <h3 id="roundText">1 / 3</h3>
    </div>

    <div class="stat-box">
      <span>AI</span>
      <h3 id="aiChoice">-</h3>
    </div>

  </div>
</div>
      </div>
    </div>
  <audio id="winSound" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3"></audio>

<audio id="loseSound" src="https://assets.mixkit.co/active_storage/sfx/270/270-preview.mp3"></audio>

<audio id="drawSound" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>
    <script src="script.js"></script>
  </body>
</html>
